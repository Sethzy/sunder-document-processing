<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sunder - AI Document Processing for Singapore SMEs</title>
    <link
      rel="preload"
      as="image"
      href="/exports/hero-watercolor.webp"
      type="image/webp"
      fetchpriority="high"
    />
    <style>
      html,
      body {
        margin: 0;
        min-height: 100%;
        background: #faf7f2;
      }

      #app-boot-bg {
        position: fixed;
        inset: 0;
        z-index: 0;
        pointer-events: none;
        opacity: 0;
        transition: opacity 220ms ease;
        background-image:
          radial-gradient(
            80% 50% at 50% 18%,
            rgba(210, 202, 186, 0.5),
            rgba(250, 247, 242, 0.35) 60%,
            rgba(0, 0, 0, 0) 100%
          );
        background-repeat: no-repeat;
        background-position: top center;
        background-size: cover;
        mask-image: radial-gradient(
          ellipse 100% 70% at 50% 25%,
          black 20%,
          rgba(0, 0, 0, 0.5) 38%,
          transparent 58%
        );
        -webkit-mask-image: radial-gradient(
          ellipse 100% 70% at 50% 25%,
          black 20%,
          rgba(0, 0, 0, 0.5) 38%,
          transparent 58%
        );
      }

      html.boot-bg-visible #app-boot-bg {
        opacity: 0.82;
      }

      html.app-ready #app-boot-bg {
        opacity: 0;
      }

      #root {
        position: relative;
        z-index: 1;
        min-height: 100vh;
      }
    </style>
    <script>
      window.setTimeout(function () {
        if (!document.documentElement.classList.contains("app-ready")) {
          document.documentElement.classList.add("boot-bg-visible");
        }
      }, 220);
    </script>

    <!-- JSON-LD Structured Data for Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Sunder",
      "alternateName": ["Try Sunder", "Sunder AI", "Sunder Inc"],
      "url": "https://www.trysunder.com",
      "logo": "https://www.trysunder.com/neobot-logo.svg",
      "description": "AI-powered document processing platform for invoices, receipts, and contracts.",
      "address": {
        "@type": "PostalAddress",
        "streetAddress": "109 North Bridge Road, Funan",
        "addressLocality": "Singapore",
        "postalCode": "179097",
        "addressCountry": "SG"
      }
    }
    </script>

    <!-- JSON-LD Structured Data for WebSite -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Sunder",
      "alternateName": "Try Sunder",
      "url": "https://www.trysunder.com",
      "description": "AI document processing platform for Singapore SMEs. Automate invoice processing, receipt extraction, and contract management."
    }
    </script>

    <!-- JSON-LD Structured Data for SoftwareApplication -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Sunder",
      "applicationCategory": "BusinessApplication",
      "operatingSystem": "Web",
      "description": "AI document processing platform for invoices, receipts, and contracts.",
      "url": "https://www.trysunder.com",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "SGD",
        "description": "Free trial available"
      },
      "provider": {
        "@type": "Organization",
        "name": "Sunder"
      }
    }
    </script>
  </head>
  <body>
    <div id="app-boot-bg" aria-hidden="true"></div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
