<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sunder - AI Document Processing for Singapore SMEs</title>

    <!-- JSON-LD Structured Data for Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Sunder",
      "alternateName": ["Try Sunder", "Sunder AI", "Sunder Inc"],
      "url": "https://www.trysunder.com",
      "logo": "https://www.trysunder.com/sunder-logo.svg",
      "description": "AI-powered document processing platform for invoices, receipts, and contracts.",
      "address": {
        "@type": "PostalAddress",
        "streetAddress": "109 North Bridge Road, Funan",
        "addressLocality": "Singapore",
        "postalCode": "179097",
        "addressCountry": "SG"
      }
    }
    </script>

    <!-- JSON-LD Structured Data for WebSite -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Sunder",
      "alternateName": "Try Sunder",
      "url": "https://www.trysunder.com",
      "description": "AI document processing platform for Singapore SMEs. Automate invoice processing, receipt extraction, and contract management."
    }
    </script>

    <!-- JSON-LD Structured Data for SoftwareApplication -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Sunder",
      "applicationCategory": "BusinessApplication",
      "operatingSystem": "Web",
      "description": "AI document processing platform for invoices, receipts, and contracts.",
      "url": "https://www.trysunder.com",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "SGD",
        "description": "Free trial available"
      },
      "provider": {
        "@type": "Organization",
        "name": "Sunder"
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
