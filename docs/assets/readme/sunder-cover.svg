  <path d="M456 337C492 337 479 337 506 337" stroke="#0C7C71" stroke-width="5" stroke-linecap="round" stroke-dasharray="2 14"/>
  <path d="M1042 337C1070 337 1052 337 1074 337" stroke="#0C7C71" stroke-width="5" stroke-linecap="round" stroke-dasharray="2 14"/>

  <text x="92" y="630" fill="#0E2A27" font-family="Inter, Arial, sans-serif" font-size="42" font-weight="850">AI document operations for claims teams</text>
  <text x="94" y="670" fill="#49645F" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="500">Messy PDFs and scans become a citation-backed, human-reviewed case dossier.</text>
